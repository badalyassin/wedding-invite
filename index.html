<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body{
margin:0;
font-family:Georgia, serif;
background:#f5f2f0;
color:#7b2b1f;
text-align:center;
}

/* CURTAIN */
.curtain{
position:fixed;
top:0;
width:50%;
height:100%;
background:#8b0000;
z-index:10;
transition:1.5s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

.tap{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:50%;
cursor:pointer;
}

/* SCRATCH */
.circle{
width:150px;
height:150px;
border-radius:50%;
background:gold;
margin:20px;
display:inline-block;
position:relative;
}

.circle span{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
}

canvas{
position:absolute;
top:0;
left:0;
}

/* COUNTDOWN */
.box{
display:inline-block;
margin:10px;
padding:20px;
border:2px solid #7b2b1f;
}
</style>
</head>

<body>

<div class="tap" onclick="openCurtain()">Tap</div>

<div class="curtain left"></div>
<div class="curtain right"></div>

<h1 id="names" style="margin-top:200px; opacity:0;">Sam & Sofia</h1>

<div id="scratch" style="margin-top:100px;">
<div class="circle"><span>10</span><canvas></canvas></div>
<div class="circle"><span>Sept</span><canvas></canvas></div>
<div class="circle"><span>2027</span><canvas></canvas></div>
</div>

<h2 id="married" style="opacity:0;">We’re getting married!</h2>

<div id="countdown">
<div class="box" id="d"></div>
<div class="box" id="h"></div>
<div class="box" id="m"></div>
<div class="box" id="s"></div>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>

// CURTAIN
function openCurtain(){
document.body.classList.add("open");
document.getElementById("names").style.opacity=1;
document.querySelector(".tap").style.display="none";
document.getElementById("music").play();
}

// SCRATCH FIX
let scratched=0;

document.querySelectorAll("canvas").forEach(canvas=>{
let ctx=canvas.getContext("2d");
canvas.width=150;
canvas.height=150;

ctx.fillStyle="gold";
ctx.fillRect(0,0,150,150);

let drawing=false;

canvas.addEventListener("pointerdown",()=>drawing=true);
canvas.addEventListener("pointerup",()=>{
drawing=false;
scratched++;
canvas.style.display="none";

if(scratched==3){
document.getElementById("married").style.opacity=1;
confetti();
}
});

canvas.addEventListener("pointermove",(e)=>{
if(!drawing)return;
ctx.globalCompositeOperation="destination-out";
ctx.beginPath();
ctx.arc(e.offsetX,e.offsetY,20,0,Math.PI*2);
ctx.fill();
});

});

// CONFETTI
function confetti(){
for(let i=0;i<50;i++){
let div=document.createElement("div");
div.style.position="fixed";
div.style.width="10px";
div.style.height="10px";
div.style.background="#7b2b1f";
div.style.left=Math.random()*100+"vw";
div.style.top="-10px";
div.style.animation="fall 2s linear";
document.body.appendChild(div);

setTimeout(()=>div.remove(),2000);
}
}

// COUNTDOWN
let target=new Date("Sep 10, 2027 18:30:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=target-now;

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((diff%(1000*60*60))/(1000*60));
let s=Math.floor((diff%(1000*60))/1000);

document.getElementById("d").innerText=d+" Days";
document.getElementById("h").innerText=h+" Hours";
document.getElementById("m").innerText=m+" Min";
document.getElementById("s").innerText=s+" Sec";

},1000);

</script>

<style>
@keyframes fall{
to{transform:translateY(100vh);}
}
</style>

</body>
</html>
