<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Wedding</title>

<style>
body{
  margin:0;
  font-family:Georgia;
  background:#111;
  color:#fff;
  text-align:center;
}

/* ===== CURTAIN ===== */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.curtain{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  background:#7a0f13;
  transition:1.5s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

.btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:gold;
  border:none;
  padding:20px;
  border-radius:50%;
  font-size:16px;
}

/* ===== SCRATCH ===== */
.scratch{
  margin:50px 0;
  display:flex;
  justify-content:center;
  gap:20px;
}

canvas{
  border-radius:50%;
  background:gold;
}

/* ===== COUNTDOWN ===== */
.count{
  font-size:30px;
  margin-top:50px;
}
</style>
</head>

<body>

<div class="hero" id="hero">
  <div class="curtain left"></div>
  <div class="curtain right"></div>
  <button class="btn" onclick="openInvite()">Tap</button>
</div>

<h1>Daniel & Sophooia</h1>

<div class="scratch">
  <canvas id="c1" width="120" height="120"></canvas>
  <canvas id="c2" width="120" height="120"></canvas>
  <canvas id="c3" width="120" height="120"></canvas>
</div>

<div class="count" id="count"></div>

<audio id="music" src="music.mp3" loop></audio>

<script>

/* ===== OPEN ===== */
function openInvite(){
  document.getElementById("hero").classList.add("open");
  document.getElementById("music").play();
}

/* ===== SCRATCH ===== */
function setup(canvas, text){
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="gold";
  ctx.fillRect(0,0,120,120);

  let done=false;

  canvas.addEventListener("pointermove",(e)=>{
    if(e.buttons!==1 || done) return;
    let rect=canvas.getBoundingClientRect();
    let x=e.clientX-rect.left;
    let y=e.clientY-rect.top;

    ctx.globalCompositeOperation="destination-out";
    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.fill();

    check();
  });

  function check(){
    let data=ctx.getImageData(0,0,120,120).data;
    let clear=0;
    for(let i=3;i<data.length;i+=4){
      if(data[i]<10) clear++;
    }
    if(clear/data.length>0.2 && !done){
      done=true;
      canvas.style.opacity=0;
      canvas.after(document.createTextNode(text));
      checkAll();
    }
  }
}

let doneAll=0;

function checkAll(){
  doneAll++;
  if(doneAll===3){
    alert("🎉 Wedding Revealed!");
  }
}

setup(document.getElementById("c1"),"10");
setup(document.getElementById("c2"),"September");
setup(document.getElementById("c3"),"2027");

/* ===== COUNTDOWN ===== */
let target=new Date("2027-09-10T19:00:00");

setInterval(()=>{
  let now=new Date();
  let diff=target-now;

  let d=Math.floor(diff/86400000);
  let h=Math.floor(diff%86400000/3600000);
  let m=Math.floor(diff%3600000/60000);
  let s=Math.floor(diff%60000/1000);

  document.getElementById("count").innerHTML=
    d+"d "+h+"h "+m+"m "+s+"s";
},1000);

</script>

</body>
</html>
