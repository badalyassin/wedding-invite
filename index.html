<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Wedding</title>

<style>
body{
  margin:0;
  font-family:Georgia;
  background:#0f0c0c;
  color:#fff;
  text-align:center;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* CURTAIN */
.curtain{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  background:linear-gradient(90deg,#5a0d12,#a4161a);
  transition:1.6s cubic-bezier(.2,.8,.2,1);
  z-index:2;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

/* BUTTON */
.btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,#f3d77c,#caa21e);
  border:none;
  width:120px;
  height:120px;
  border-radius:50%;
  cursor:pointer;
  font-weight:bold;
  z-index:5;
}

/* TITLE */
.title{
  margin-top:40px;
  font-size:48px;
  background:linear-gradient(gold,#fff);
  -webkit-background-clip:text;
  color:transparent;
}

/* SCRATCH */
.scratch{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:60px;
}

canvas{
  width:140px;
  height:140px;
  border-radius:50%;
}

/* CONFETTI */
.confetti{
  position:fixed;
  top:0;
  width:10px;
  height:10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
  }
}

/* COUNTDOWN */
.count{
  margin-top:60px;
  font-size:28px;
}
</style>
</head>

<body>

<div class="hero" id="hero">
  <div class="curtain left"></div>
  <div class="curtain right"></div>

  <button class="btn" id="openBtn">OPEN</button>
</div>

<h1 class="title">Daniel & Sophia</h1>

<div class="scratch">
  <canvas id="day"></canvas>
  <canvas id="month"></canvas>
  <canvas id="year"></canvas>
</div>

<div class="count" id="count"></div>

<audio id="music" src="music.mp3" loop></audio>

<script>

/* OPEN */
document.getElementById("openBtn").addEventListener("click",()=>{
  document.getElementById("hero").classList.add("open");

  const music=document.getElementById("music");
  music.play().catch(()=>{});
});

/* SCRATCH ENGINE */
let done=0;

function createScratch(canvas,text){
  const ctx=canvas.getContext("2d");
  canvas.width=140;
  canvas.height=140;

  ctx.fillStyle="gold";
  ctx.fillRect(0,0,140,140);

  let draw=false;
  let finished=false;

  canvas.addEventListener("pointerdown",()=>draw=true);
  window.addEventListener("pointerup",()=>draw=false);

  canvas.addEventListener("pointermove",(e)=>{
    if(!draw || finished) return;

    let r=canvas.getBoundingClientRect();
    let x=e.clientX-r.left;
    let y=e.clientY-r.top;

    ctx.globalCompositeOperation="destination-out";
    ctx.beginPath();
    ctx.arc(x,y,15,0,Math.PI*2);
    ctx.fill();

    check();
  });

  function check(){
    let data=ctx.getImageData(0,0,140,140).data;
    let cleared=0;

    for(let i=3;i<data.length;i+=4){
      if(data[i]<10) cleared++;
    }

    if(cleared/data.length>0.3 && !finished){
      finished=true;
      canvas.style.opacity=0;

      let el=document.createElement("div");
      el.innerHTML=text;
      el.style.fontSize="20px";
      canvas.parentNode.appendChild(el);

      done++;
      if(done===3) confetti();
    }
  }
}

createScratch(day,"10");
createScratch(month,"September");
createScratch(year,"2027");

/* CONFETTI */
function confetti(){
  for(let i=0;i<120;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["gold","#fff","#d4af37"][Math.floor(Math.random()*3)];
    c.style.animationDuration=2+Math.random()*2+"s";

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

/* COUNTDOWN */
let target=new Date("2027-09-10T19:00:00");

setInterval(()=>{
  let now=new Date();
  let diff=target-now;

  let d=Math.floor(diff/86400000);
  let h=Math.floor(diff%86400000/3600000);
  let m=Math.floor(diff%3600000/60000);
  let s=Math.floor(diff%60000/1000);

  document.getElementById("count").innerHTML=
  d+" Days "+h+" Hours "+m+" Min "+s+" Sec";

},1000);

</script>
</body>
</html>
